<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Bella Donna</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --rose:#C9797A; --rose-light:#F5EAEA; --rose-dark:#8B4A4A;
  --cream:#FAF6F1; --gold:#C9A86C; --text:#2C1F1F; --text-muted:#7A5F5F;
}
body {
  font-family:'Tajawal',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:40px 20px;
}
.logo {
  font-family:'Playfair Display',serif;
  font-size:22px; color:var(--rose-dark);
  letter-spacing:3px; text-transform:uppercase;
  margin-bottom:50px;
}
.logo span { color:var(--gold); font-style:italic; }
.number {
  font-family:'Playfair Display',serif;
  font-size:clamp(100px,20vw,160px);
  color:var(--rose-light);
  line-height:1;
  position:relative;
  margin-bottom:10px;
}
.number::after {
  content:'404';
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(100px,20vw,160px);
  color:var(--rose-dark);
  opacity:0.12;
}
.flower {
  font-size:52px;
  margin-bottom:20px;
  animation: sway 3s ease-in-out infinite;
}
@keyframes sway {
  0%,100% { transform:rotate(-5deg); }
  50% { transform:rotate(5deg); }
}
.title {
  font-family:'Playfair Display',serif;
  font-size:clamp(24px,4vw,36px);
  color:var(--rose-dark);
  margin-bottom:8px;
}
.title em { font-style:italic; color:var(--gold); }
.subtitle-fr {
  font-size:15px; color:var(--text-muted);
  margin-bottom:6px; font-weight:300;
}
.subtitle-ar {
  font-size:16px; color:var(--rose);
  font-weight:500; direction:rtl;
  margin-bottom:36px;
}
.divider {
  display:flex; align-items:center; gap:12px;
  justify-content:center; margin-bottom:36px;
}
.divider-line { width:60px; height:1px; background:var(--gold); opacity:0.5; }
.divider-dot { width:5px; height:5px; border-radius:50%; background:var(--gold); }
.btn-home {
  background:var(--rose);
  color:white; text-decoration:none;
  padding:14px 36px; border-radius:40px;
  font-family:'Tajawal',sans-serif;
  font-size:15px; font-weight:500;
  display:inline-block; margin-bottom:14px;
  transition:all .2s;
}
.btn-home:hover { background:var(--rose-dark); transform:translateY(-2px); }
.btn-wa {
  background:#25D366;
  color:white; text-decoration:none;
  padding:14px 36px; border-radius:40px;
  font-family:'Tajawal',sans-serif;
  font-size:15px; font-weight:500;
  display:inline-block; margin-left:12px;
  transition:all .2s;
}
.btn-wa:hover { background:#1da851; transform:translateY(-2px); }
.links { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
footer-note {
  margin-top:50px;
  font-size:12px; color:var(--text-muted);
  opacity:0.6;
}
</style>
</head>
<body>

<div class="logo">Bella <span>Donna</span></div>

<div class="flower">🌸</div>

<div class="number">404</div>

<h1 class="title">Page <em>introuvable</em></h1>
<p class="subtitle-fr">Oups ! Cette page n'existe pas ou a été déplacée.</p>
<p class="subtitle-ar">عذراً، هذه الصفحة غير موجودة</p>

<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-dot"></div>
  <div class="divider-line"></div>
</div>

<div class="links">
  <a href="/" class="btn-home">← Retour à l'accueil</a>
  <a href="https://wa.me/212626613741" target="_blank" class="btn-wa">💬 Nous contacter</a>
</div>

<p style="margin-top:40px;font-size:12px;color:var(--text-muted);opacity:0.6;">
  Bella Donna · Salon de Coiffure, Esthétique & Nail Spa · Tanger
</p>

</body>
</html>
